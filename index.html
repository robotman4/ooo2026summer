<style>
  :root { color-scheme: dark; }
  body {
    background: #0d1117;

  }

    display: inline-block;
    font-size: 0.8em;
    padding: 3px 8px;
    border-radius: 10px;
    margin-bottom: 20px;
  }
  .badge-solved { background: #2ea04333; color: #3fb950; border: 1px solid #3fb950; }
  .badge-open { background: #f8514933; color: #f85149; border: 1px solid #f85149; }

</head>
<body>

<!--

  the rest doesn't live here.
-->

<div id="status-badge">checking status...</div>

<h1>&gt; access_denied</h1>
<p><span class="prompt">$</span> this page is not what it looks like.</p>
<p>Somewhere in here is a flag. Format: <code>FLAG{...}</code></p>

<div class="cipher" id="cipher">loading...</div>

<p><small>That's the payload. It's not plaintext.</small></p>

<input id="answer" placeholder="FLAG{...}" autocomplete="off" spellcheck="false">
<button onclick="submitAnswer()">submit</button>
<div id="result"></div>

<p><small>One valid solve per day triggers a notification. After that, submissions still get checked but nothing fires.</small></p>

<script>
  console.log("%cyou're in the console. good start.", "color:#3fb950;font-family:monospace;");
  console.log(atob("Q2hlY2sgdGhlIHJlc3BvbnNlIGhlYWRlcnMuIGN1cmwgLUkgdGhpcyBwYWdlLg=="));

  async function loadCipher() {
    const el = document.getElementById('cipher');
    try {
      const res = await fetch('/.netlify/functions/cipher');
      const data = await res.json();
      el.textContent = data.cipher || 'error loading payload';
    } catch (e) {
      el.textContent = 'error loading payload';
    }
  }

  async function loadStatus() {
    const badge = document.getElementById('status-badge');
    try {
      const res = await fetch('/.netlify/functions/status');
      const data = await res.json();
      if (data.solvedToday) {
        badge.textContent = 'solved today at ' + data.solvedAt;
        badge.className = 'badge-solved';
      } else {
        badge.textContent = 'unsolved today';
        badge.className = 'badge-open';
      }
    } catch (e) {
      badge.textContent = 'status unknown';
    }
  }

  async function submitAnswer() {
    const val = document.getElementById('answer').value;
    const result = document.getElementById('result');
    result.textContent = 'checking...';
    result.className = '';
    try {
      const res = await fetch('/.netlify/functions/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answer: val })
      });
      const data = await res.json();
      if (data.correct && !data.alreadySolvedToday) {
        result.textContent = 'correct. you are the first today. notification sent.';
        result.className = 'ok';
      } else if (data.correct && data.alreadySolvedToday) {
        result.textContent = 'correct, but someone already solved it today. no notification sent.';
        result.className = 'ok';
      } else {
        result.textContent = 'wrong.';
        result.className = 'bad';
      }
      loadStatus();
    } catch (e) {
      result.textContent = 'error contacting server.';
      result.className = 'bad';
    }
  }

  loadCipher();
  loadStatus();
</script>

</body>
</html>
